name: Keep Supabase Awake

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        run: |
          code=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
            -H "apikey: sb_publishable_h9ZLZbLM029RBqg2rEAjdg_C9okFW1R" \
            "https://mxibsyytgcixxcfskwvp.supabase.co/auth/v1/health")
          echo "Supabase health HTTP code: $code"
          test "$code" = "200"
